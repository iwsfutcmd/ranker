<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🥇🥈🥉</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    max-width: 600px;
    margin: 40px auto;
    padding: 0 16px;
    position: relative;
    display: flex;
    flex-direction: column;
    min-height: calc(100vh - 80px);
    min-height: calc(100dvh - 80px);
  }
  #question-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  h1 { text-align: center; }
  #export-btn {
    position: absolute;
    top: 0;
    right: 16px;
  }
  #undo-btn {
    display: block;
    width: 100%;
    margin-top: 12px;
  }
  textarea {
    width: 100%;
    height: 200px;
    font: inherit;
    box-sizing: border-box;
  }
  button {
    font: inherit;
    font-size: 1.3em;
    padding: 10px 16px;
    cursor: pointer;
  }
  #choices {
    display: flex;
    gap: 12px;
    flex: 1;
  }
  .choice {
    flex: 1;
    padding: 24px 16px;
    font-size: 1.1em;
    overflow-wrap: anywhere;
  }
  .hidden { display: none !important; }
  #progress { color: #666; margin-bottom: 12px; }
  ol li { margin: 4px 0; }
</style>
</head>
<body>

<h1>🥇🥈🥉</h1>

<div id="input-screen">
  <textarea id="items" placeholder="🍎&#10;🍌&#10;🍒"></textarea>
  <p><button onclick="start('merge')" title="Start (varied questions, fewest total)">▶</button>
  <button onclick="start('top')" title="Start top-first (best items ranked first — stop anytime)">🥇▶</button>
  <button id="resume-btn" class="hidden" onclick="resume()" title="Resume previous session">💾▶</button></p>
</div>

<div id="question-screen" class="hidden">
  <button id="export-btn" onclick="exportProgress()" title="Export progress">📤</button>
  <div id="progress"></div>
  <div id="choices">
    <button class="choice" id="choice-a" title="←"></button>
    <button class="choice" id="choice-b" title="→"></button>
  </div>
  <button id="undo-btn" onclick="undo()" title="Undo (Backspace)">↩</button>
</div>

<div id="result-screen" class="hidden">
  <h2 id="result-title"></h2>
  <ol id="ranking"></ol>
  <p id="export-note"></p>
  <textarea id="export-text" readonly onclick="this.select()" title="Copy this to save your progress"></textarea>
  <p><button id="continue-btn" class="hidden" onclick="continueRanking()" title="Continue ranking">▶</button>
  <button id="result-undo-btn" class="hidden" onclick="undo()" title="Undo last answer">↩</button>
  <button onclick="location.reload()" title="Start over">↻</button></p>
</div>

<script>
// Merge sort where all merges in a round run concurrently: each question is
// drawn from a randomly chosen in-progress merge, so consecutive questions
// rarely involve the same items.
let mode = 'merge';  // 'merge' (varied questions) or 'top' (best-first tournament)
let runs = [];    // merge mode: sorted runs (best first) waiting for the next round
let tasks = [];   // merge mode: in-progress merges: {a, b, ai, bi, out}
let tree = null;  // top mode: tournament tree; leaf {run, pos}, node {l, r, w}
let ranked = [];  // top mode: globally ranked items so far, best first
let asked = 0;
let history = [];  // snapshots taken before each answer, for undo
let lastQ = null;  // which task/side the current question shows

const STORAGE_KEY = 'ranker-state';

function stateObj() {
  return { mode, runs, tasks, tree, ranked, asked };
}

function restoreState(s) {
  mode = s.mode || 'merge';
  runs = s.runs || [];
  tasks = s.tasks || [];
  tree = s.tree || null;
  ranked = s.ranked || [];
  asked = s.asked || 0;
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(stateObj()));
  } catch (e) { /* storage unavailable; keep going without saving */ }
}

function resume() {
  restoreState(JSON.parse(localStorage.getItem(STORAGE_KEY)));
  history = [];
  if (mode === 'top') {
    askTop();
  } else if (tasks.length === 0) {
    startRound();
  } else {
    ask();
  }
}

function continueRanking() {
  if (mode === 'top') {
    askTop();
  } else {
    ask();
  }
}

function show(id) {
  for (const s of ['input-screen', 'question-screen', 'result-screen']) {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  }
}

// worst-case comparison count for bottom-up merge sort over runs of given sizes
function worstCase(sizes) {
  let s = sizes.slice(), total = 0;
  while (s.length > 1) {
    const next = [];
    for (let i = 0; i < s.length; i += 2) {
      if (i + 1 < s.length) {
        total += s[i] + s[i + 1] - 1;
        next.push(s[i] + s[i + 1]);
      } else {
        next.push(s[i]);
      }
    }
    s = next;
  }
  return total;
}

function start(m) {
  const lines = document.getElementById('items').value
    .split('\n').map(s => s.trim());
  // "---" lines separate groups that are already ranked best-first (from an
  // export); without any "---", every line is an unranked item
  let groups = [];
  if (lines.includes('---')) {
    let cur = [];
    for (const line of lines) {
      if (line === '---') {
        if (cur.length) groups.push(cur);
        cur = [];
      } else if (line) {
        cur.push(line);
      }
    }
    if (cur.length) groups.push(cur);
  } else {
    groups = lines.filter(s => s.length > 0).map(x => [x]);
  }
  if (groups.reduce((s, g) => s + g.length, 0) < 2) {
    alert('≥ 2 ⚠️');
    return;
  }
  // shuffle group order so pairings don't depend on paste order
  for (let i = groups.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [groups[i], groups[j]] = [groups[j], groups[i]];
  }
  mode = m;
  asked = 0;
  history = [];
  if (mode === 'top') {
    // balanced tournament tree; each group is a pre-sorted leaf run
    let nodes = groups.map(g => ({ run: g, pos: 0 }));
    while (nodes.length > 1) {
      const next = [];
      for (let i = 0; i < nodes.length; i += 2) {
        next.push(i + 1 < nodes.length
          ? { l: nodes[i], r: nodes[i + 1], w: null }
          : nodes[i]);
      }
      nodes = next;
    }
    tree = nodes[0];
    ranked = [];
    runs = [];
    tasks = [];
    askTop();
    return;
  }
  runs = groups;
  tasks = [];
  tree = null;
  ranked = [];
  startRound();
}

function undo() {
  if (history.length === 0) return;
  const h = history.pop();
  restoreState(JSON.parse(h.snap));
  const forced = { qi: h.qi, aOnLeft: h.aOnLeft };  // re-show the same question
  if (mode === 'top') {
    askTop(forced);
  } else {
    ask(forced);
  }
}

// worst-case questions left from the current state: finish each in-progress
// merge, then merge-sort the resulting runs
function remainingWorstCase() {
  let rem = 0;
  const sizes = runs.map(r => r.length);
  for (const t of tasks) {
    const ar = t.a.length - t.ai, br = t.b.length - t.bi;
    rem += ar + br - 1;
    sizes.push(t.out.length + ar + br);
  }
  return rem + worstCase(sizes);
}

// ---- top-first (tournament) mode ----
// Each internal node remembers which child won (w: 'L'/'R'/null). The tree's
// value is the best not-yet-ranked item; resolving it costs one question per
// unresolved node on the winner's path, so #1 costs ~n questions and each
// subsequent item only ~log2(n) more.

const UNKNOWN = Symbol();

// best remaining item under nd: a string, null (exhausted), or UNKNOWN
function val(nd) {
  if (!nd.l) return nd.pos < nd.run.length ? nd.run[nd.pos] : null;
  if (nd.w === 'L') return val(nd.l);
  if (nd.w === 'R') return val(nd.r);
  const a = val(nd.l), b = val(nd.r);
  if (a === null) return b;
  if (b === null) return a;
  return UNKNOWN;  // both alive: needs a question here (or deeper)
}

// nodes whose question is needed to resolve the root, in deterministic order
function collectAskable(nd, out) {
  if (!nd.l || nd.w) return;
  const a = val(nd.l), b = val(nd.r);
  if (a === UNKNOWN) collectAskable(nd.l, out);
  if (b === UNKNOWN) collectAskable(nd.r, out);
  if (a !== UNKNOWN && b !== UNKNOWN && a !== null && b !== null) out.push(nd);
}

// remove the root's current best item, clearing winners along its path
function popTree(nd) {
  if (!nd.l) { nd.pos++; return; }
  let side = nd.w;
  if (!side) side = val(nd.l) === null ? 'R' : 'L';
  nd.w = null;
  popTree(side === 'L' ? nd.l : nd.r);
}

function leafRuns(nd, out) {
  if (!nd.l) {
    if (nd.pos < nd.run.length) out.push(nd.run.slice(nd.pos));
    return;
  }
  leafRuns(nd.l, out);
  leafRuns(nd.r, out);
}

// upper bound on questions left: fill every unresolved node, then each of the
// remaining extractions costs at most the tree height
function remainingTop() {
  let m = 0, unresolved = 0, height = 0;
  (function scan(nd, d) {
    if (!nd.l) {
      m += nd.run.length - nd.pos;
      height = Math.max(height, d);
      return;
    }
    if (!nd.w) unresolved++;
    scan(nd.l, d + 1);
    scan(nd.r, d + 1);
  })(tree, 0);
  return m <= 1 ? 0 : unresolved + (m - 1) * height;
}

function askTop(forced) {
  while (true) {
    const v = val(tree);
    if (v === UNKNOWN) break;
    if (v === null) { finish(ranked); return; }
    ranked.push(v);
    popTree(tree);
  }
  saveState();
  const cands = [];
  collectAskable(tree, cands);
  const qi = forced ? forced.qi : Math.floor(Math.random() * cands.length);
  const nd = cands[qi];
  const aOnLeft = forced ? forced.aOnLeft : Math.random() < 0.5;
  lastQ = { qi, aOnLeft };
  show('question-screen');
  document.getElementById('undo-btn').disabled = history.length === 0;
  document.getElementById('progress').textContent =
    `🏆 ${ranked.length} · ❓ ${asked + 1} · ⏳ ≤ ${remainingTop()}`;
  const a = document.getElementById('choice-a');
  const b = document.getElementById('choice-b');
  const A = val(nd.l), B = val(nd.r);
  a.textContent = aOnLeft ? A : B;
  b.textContent = aOnLeft ? B : A;
  a.onclick = () => answerTop(nd, aOnLeft);
  b.onclick = () => answerTop(nd, !aOnLeft);
}

function answerTop(nd, lWon) {
  history.push({
    snap: JSON.stringify(stateObj()),
    qi: lastQ.qi,
    aOnLeft: lastQ.aOnLeft,
  });
  asked++;
  nd.w = lWon ? 'L' : 'R';
  askTop();
}

// ---- merge (varied) mode ----

function startRound() {
  if (tasks.length === 0 && runs.length === 1) {
    finish(runs[0]);
    return;
  }
  const leftover = [];
  tasks = [];
  for (let i = 0; i < runs.length; i += 2) {
    if (i + 1 < runs.length) {
      tasks.push({ a: runs[i], b: runs[i + 1], ai: 0, bi: 0, out: [] });
    } else {
      leftover.push(runs[i]);
    }
  }
  runs = leftover;
  ask();
}

function ask(forced) {
  saveState();
  // retire merges where one side is exhausted
  for (let i = tasks.length - 1; i >= 0; i--) {
    const t = tasks[i];
    if (t.ai >= t.a.length || t.bi >= t.b.length) {
      t.out.push(...t.a.slice(t.ai), ...t.b.slice(t.bi));
      runs.push(t.out);
      tasks.splice(i, 1);
    }
  }
  if (tasks.length === 0) {
    startRound();
    return;
  }
  const qi = forced ? forced.qi : Math.floor(Math.random() * tasks.length);
  const t = tasks[qi];
  const aOnLeft = forced ? forced.aOnLeft : Math.random() < 0.5;
  lastQ = { qi, aOnLeft };
  show('question-screen');
  document.getElementById('undo-btn').disabled = history.length === 0;
  document.getElementById('progress').textContent =
    `❓ ${asked + 1} · ⏳ ≤ ${remainingWorstCase()}`;
  const a = document.getElementById('choice-a');
  const b = document.getElementById('choice-b');
  const left = aOnLeft ? t.a[t.ai] : t.b[t.bi];
  const right = aOnLeft ? t.b[t.bi] : t.a[t.ai];
  a.textContent = left;
  b.textContent = right;
  a.onclick = () => answer(t, aOnLeft);
  b.onclick = () => answer(t, !aOnLeft);
}

function answer(t, aWon) {
  history.push({
    snap: JSON.stringify(stateObj()),
    qi: lastQ.qi,
    aOnLeft: lastQ.aOnLeft,
  });
  asked++;
  if (aWon) {
    t.out.push(t.a[t.ai++]);
  } else {
    t.out.push(t.b[t.bi++]);
  }
  ask();
}

function finish(ranking) {
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
  showResult([ranking]);
}

function exportProgress() {
  if (mode === 'top') {
    // ranked-so-far is the first group; leaf remainders keep their order,
    // but unpopped tournament winners are dropped and may get re-asked
    const rs = [];
    if (ranked.length) rs.push(ranked.slice());
    leafRuns(tree, rs);
    showResult(rs);
    return;
  }
  // snapshot everything as sorted runs; for an in-progress merge, out beats
  // all of a's remainder, so out + a-remainder is one run and b-remainder
  // is another (out-vs-b info is dropped and may get re-asked on resume)
  const rs = runs.map(r => r.slice());
  for (const t of tasks) {
    const r1 = [...t.out, ...t.a.slice(t.ai)];
    const r2 = t.b.slice(t.bi);
    if (r1.length) rs.push(r1);
    if (r2.length) rs.push(r2);
  }
  showResult(rs);
}

function showResult(rs) {
  const complete = rs.length === 1;
  document.getElementById('result-title').textContent =
    complete ? '🏆' : '⏳';
  const ol = document.getElementById('ranking');
  ol.innerHTML = '';
  if (complete) {
    for (const item of rs[0]) {
      const li = document.createElement('li');
      li.textContent = item;
      ol.appendChild(li);
    }
  }
  document.getElementById('export-note').textContent =
    complete ? '📋' : '📋 → 📥';
  document.getElementById('export-text').value =
    rs.map(r => r.join('\n')).join('\n---\n');
  document.getElementById('continue-btn').classList.toggle('hidden', complete);
  document.getElementById('result-undo-btn').classList.toggle(
    'hidden', !(complete && history.length > 0));
  show('result-screen');
}

document.addEventListener('keydown', e => {
  const onQuestion =
    !document.getElementById('question-screen').classList.contains('hidden');
  const resultUndoVisible =
    !document.getElementById('result-screen').classList.contains('hidden') &&
    !document.getElementById('result-undo-btn').classList.contains('hidden');
  if (onQuestion && e.key === 'ArrowLeft') {
    e.preventDefault();
    document.getElementById('choice-a').click();
  } else if (onQuestion && e.key === 'ArrowRight') {
    e.preventDefault();
    document.getElementById('choice-b').click();
  } else if (e.key === 'Backspace' && (onQuestion || resultUndoVisible)) {
    e.preventDefault();
    undo();
  }
});

try {
  if (localStorage.getItem(STORAGE_KEY)) {
    document.getElementById('resume-btn').classList.remove('hidden');
  }
} catch (e) {}
</script>

</body>
</html>
